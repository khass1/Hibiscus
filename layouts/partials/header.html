<header class="site-header" data-header>
  <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
  <div class="container header-inner">
    <a class="brand" href="/" aria-label="Hibiscus Phytocosméticos, página inicial">
      <span class="brand-wordmark">Hibiscus<span class="brand-dot">.</span></span>
      <span class="brand-sub">Phytocosméticos</span>
    </a>

    <button class="nav-toggle" data-nav-toggle aria-expanded="false" aria-controls="primary-nav" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>

    <nav class="primary-nav" id="primary-nav" aria-label="Principal">
      <ul>
        {{ range site.Menus.main }}
          <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
      <a class="nav-cta" href="{{ partial "whatsapp-url.html" "" }}" rel="noopener">
        Fale conosco
      </a>
    </nav>
  </div>
</header>
<script>
  (function(){
    var btn = document.querySelector('[data-nav-toggle]');
    var nav = document.getElementById('primary-nav');
    if(!btn || !nav) return;
    btn.addEventListener('click', function(){
      var open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!open));
      btn.setAttribute('aria-label', open ? 'Abrir menu' : 'Fechar menu');
      nav.classList.toggle('is-open', !open);
      document.body.classList.toggle('nav-open', !open);
    });
  })();
</script>

baseURL = "https://www.hibiscus.com.br/"
languageCode = "pt-BR"
defaultContentLanguage = "pt-br"
title = "Hibiscus Phytocosméticos"
enableRobotsTXT = true
enableGitInfo = false
canonifyURLs = true

[params]
  description = "Desenvolvemos e fabricamos cosméticos personalizados para a sua marca. Private label em São Bernardo do Campo."
  ogImage = "/img/og.jpg"
  whatsappPhone = "5511976591889"
  phone = "1143907736"
  phoneDisplay = "(11) 4390-7736"
  whatsappDisplay = "(11) 97659-1889"
  address = "Rua Max Mangels Senior, 347 — Planalto, São Bernardo do Campo/SP"
  hours = "Seg a Sex de 7h às 17h"
  rhEmail = "rh@hibiscus.net.br"
  contatoEmail = "contato@hibiscus.net.br"
  # Set to a real URL when/if a corporate Instagram is created.
  # Empty = footer hides the social block and JSON-LD omits sameAs.
  instagram = ""
  facebook = ""
  # Search engine verification — paste the content="..." value from each console.
  # Leave empty to omit the meta tag entirely.
  googleSiteVerification = ""
  bingSiteVerification = ""

[markup.goldmark.renderer]
  unsafe = true

[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS"]

[menus]
  [[menus.main]]
    name = "Início"
    url = "/"
    weight = 10
  [[menus.main]]
    name = "Quem Somos"
    url = "/quem-somos/"
    weight = 20
  [[menus.main]]
    name = "O que Fazemos"
    url = "/o-que-fazemos/"
    weight = 30
  [[menus.main]]
    name = "Contato"
    url = "/contato/"
    weight = 40
